name: Build & Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build plugin (.so)
        run: nix build '.#lib' -L

      - name: Build standalone app
        run: nix build '.#app' -L

      - name: Prepare release artifacts
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          mkdir -p release
          APP_PATH=$(nix build '.#app' --print-out-paths)
          LIB_PATH=$(nix build '.#lib' --print-out-paths)
          
          # Package standalone app
          cp -rL $APP_PATH release/logos-lez-registry-app
          tar -czf release/logos-lez-registry-app-x86_64-linux.tar.gz -C release logos-lez-registry-app
          
          # Package plugin
          cp -L $LIB_PATH/lib/liblez_registry_module.so release/
          
          # Generate SHA256 checksums
          cd release && sha256sum *.tar.gz *.so > SHA256SUMS

      - name: Get short SHA
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Create Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ steps.sha.outputs.short }}
          name: Build ${{ steps.sha.outputs.short }}
          body: |
            Automated build from commit ${{ github.sha }}
            
            **Artifacts:**
            - `logos-lez-registry-app-x86_64-linux.tar.gz` — Standalone app with logoscore, logos_host, modules, QML
            - `liblez_registry_module.so` — Plugin only for existing logoscore
          files: |
            release/logos-lez-registry-app-x86_64-linux.tar.gz
            release/liblez_registry_module.so
            release/SHA256SUMS
          generate_release_notes: true
